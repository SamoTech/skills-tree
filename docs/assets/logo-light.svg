<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" fill="none" role="img" aria-label="Skills Tree">
  <!-- Root trunk -->
  <line x1="20" y1="38" x2="20" y2="26" stroke="#1a7f37" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Branch left -->
  <line x1="20" y1="26" x2="11" y2="18" stroke="#1a7f37" stroke-width="2" stroke-linecap="round"/>
  <!-- Branch right -->
  <line x1="20" y1="26" x2="29" y2="18" stroke="#1a7f37" stroke-width="2" stroke-linecap="round"/>
  <!-- Branch center up -->
  <line x1="20" y1="26" x2="20" y2="16" stroke="#1a7f37" stroke-width="2" stroke-linecap="round"/>
  <!-- Leaf nodes -->
  <circle cx="11" cy="15" r="4" fill="#1a7f37" opacity="0.85"/>
  <circle cx="20" cy="12" r="4.5" fill="#1a7f37"/>
  <circle cx="29" cy="15" r="4" fill="#1a7f37" opacity="0.85"/>
  <!-- Sub-leaf left -->
  <circle cx="7" cy="22" r="2.5" fill="#0969da" opacity="0.65"/>
  <line x1="11" y1="15" x2="7" y2="22" stroke="#1a7f37" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Sub-leaf right -->
  <circle cx="33" cy="22" r="2.5" fill="#0969da" opacity="0.65"/>
  <line x1="29" y1="15" x2="33" y2="22" stroke="#1a7f37" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Wordmark -->
  <text x="44" y="28" font-family="Inter, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#1f2328" letter-spacing="-0.4">Skills</text>
  <text x="95" y="28" font-family="Inter, -apple-system, sans-serif" font-size="17" font-weight="300" fill="#636c76" letter-spacing="-0.2">Tree</text>
</svg>
