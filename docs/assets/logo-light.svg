<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none" role="img" aria-label="Skills Tree">
  <!-- Geometric tree icon: hexagonal node grid -->
  <!-- Root trunk -->
  <rect x="22" y="36" width="4" height="8" rx="2" fill="#1a7f37"/>
  <!-- Level 3 base platform -->
  <rect x="16" y="33" width="16" height="3" rx="1.5" fill="#1a7f37" opacity="0.4"/>
  <!-- Level 2: left branch -->
  <line x1="18" y1="33" x2="10" y2="24" stroke="#1a7f37" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Level 2: right branch -->
  <line x1="30" y1="33" x2="38" y2="24" stroke="#1a7f37" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Level 2: center branch -->
  <line x1="24" y1="33" x2="24" y2="22" stroke="#1a7f37" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Node: center top -->
  <circle cx="24" cy="18" r="5" fill="#1a7f37"/>
  <circle cx="24" cy="18" r="2.5" fill="#ffffff"/>
  <!-- Node: left -->
  <circle cx="8" cy="21" r="4" fill="#0969da" opacity="0.9"/>
  <circle cx="8" cy="21" r="2" fill="#ffffff"/>
  <!-- Node: right -->
  <circle cx="40" cy="21" r="4" fill="#0969da" opacity="0.9"/>
  <circle cx="40" cy="21" r="2" fill="#ffffff"/>
  <!-- Sub-nodes level 1 -->
  <line x1="8" y1="17" x2="4" y2="11" stroke="#0969da" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <circle cx="3" cy="9" r="2.5" fill="#8250df" opacity="0.8"/>
  <line x1="8" y1="17" x2="12" y2="11" stroke="#0969da" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <circle cx="13" cy="9" r="2.5" fill="#8250df" opacity="0.8"/>
  <line x1="40" y1="17" x2="36" y2="11" stroke="#0969da" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <circle cx="35" cy="9" r="2.5" fill="#8250df" opacity="0.8"/>
  <line x1="40" y1="17" x2="44" y2="11" stroke="#0969da" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <circle cx="45" cy="9" r="2.5" fill="#8250df" opacity="0.8"/>
  <!-- Center top sub-nodes -->
  <line x1="22" y1="14" x2="18" y2="8" stroke="#1a7f37" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <circle cx="17" cy="6" r="2" fill="#1a7f37" opacity="0.6"/>
  <line x1="26" y1="14" x2="30" y2="8" stroke="#1a7f37" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <circle cx="31" cy="6" r="2" fill="#1a7f37" opacity="0.6"/>

  <!-- Wordmark -->
  <text x="58" y="32" font-family="'Segoe UI', Inter, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1c2128" letter-spacing="-0.5">Skills</text>
  <text x="115" y="32" font-family="'Segoe UI', Inter, -apple-system, sans-serif" font-size="20" font-weight="300" fill="#0969da" letter-spacing="-0.3">Tree</text>
  <!-- Underline accent -->
  <line x1="58" y1="36" x2="155" y2="36" stroke="#1a7f37" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
</svg>