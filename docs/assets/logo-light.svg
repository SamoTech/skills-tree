<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" aria-label="Skills Tree">
  <!-- Tree trunk -->
  <rect x="55" y="72" width="10" height="28" rx="3" fill="#01696f"/>
  <!-- Root branches -->
  <path d="M60 98 Q42 105 30 102" stroke="#01696f" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M60 98 Q78 105 90 102" stroke="#01696f" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Main canopy layers -->
  <!-- Bottom layer -->
  <ellipse cx="60" cy="68" rx="36" ry="16" fill="#0c4e54" opacity="0.9"/>
  <!-- Mid layer -->
  <ellipse cx="60" cy="52" rx="28" ry="15" fill="#01696f" opacity="0.95"/>
  <!-- Top layer -->
  <ellipse cx="60" cy="38" rx="20" ry="13" fill="#1a7f8a"/>
  <!-- Crown -->
  <ellipse cx="60" cy="26" rx="12" ry="10" fill="#4f98a3"/>
  <!-- Highlight dots (skill nodes) -->
  <circle cx="38" cy="62" r="4" fill="#f7f6f2" opacity="0.9"/>
  <circle cx="82" cy="62" r="4" fill="#f7f6f2" opacity="0.9"/>
  <circle cx="44" cy="48" r="3.5" fill="#f7f6f2" opacity="0.8"/>
  <circle cx="76" cy="48" r="3.5" fill="#f7f6f2" opacity="0.8"/>
  <circle cx="50" cy="36" r="3" fill="#f7f6f2" opacity="0.7"/>
  <circle cx="70" cy="36" r="3" fill="#f7f6f2" opacity="0.7"/>
  <!-- Connection lines between nodes -->
  <line x1="38" y1="62" x2="44" y2="48" stroke="#f7f6f2" stroke-width="1" opacity="0.5"/>
  <line x1="82" y1="62" x2="76" y2="48" stroke="#f7f6f2" stroke-width="1" opacity="0.5"/>
  <line x1="44" y1="48" x2="50" y2="36" stroke="#f7f6f2" stroke-width="1" opacity="0.5"/>
  <line x1="76" y1="48" x2="70" y2="36" stroke="#f7f6f2" stroke-width="1" opacity="0.5"/>
</svg>
