<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060b0f"/>
      <stop offset="100%" stop-color="#0c1a12"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
    <linearGradient id="acc2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <pattern id="dot" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="#122018"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#dot)"/>
  <rect x="0" y="0" width="4" height="320" fill="url(#acc)"/>
  <!-- tree node graph (right) -->
  <g opacity="0.22" transform="translate(840,40)">
    <!-- root -->
    <circle cx="200" cy="40" r="18" fill="#22c55e" opacity="0.9"/>
    <text x="200" y="46" font-family="monospace" font-size="11" fill="#000" text-anchor="middle">OS</text>
    <!-- branches -->
    <line x1="200" y1="58" x2="100" y2="108" stroke="#22c55e" stroke-width="2"/>
    <line x1="200" y1="58" x2="200" y2="108" stroke="#22c55e" stroke-width="2"/>
    <line x1="200" y1="58" x2="310" y2="108" stroke="#22c55e" stroke-width="2"/>
    <circle cx="100" cy="120" r="14" fill="#3b82f6" opacity="0.8"/>
    <text x="100" y="125" font-family="monospace" font-size="10" fill="#fff" text-anchor="middle">RAG</text>
    <circle cx="200" cy="120" r="14" fill="#a78bfa" opacity="0.8"/>
    <text x="200" y="125" font-family="monospace" font-size="9" fill="#fff" text-anchor="middle">ReAct</text>
    <circle cx="310" cy="120" r="14" fill="#22c55e" opacity="0.8"/>
    <text x="310" y="125" font-family="monospace" font-size="9" fill="#000" text-anchor="middle">Mem</text>
    <!-- leaves -->
    <line x1="100" y1="134" x2="60"  y2="178" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="100" y1="134" x2="140" y2="178" stroke="#3b82f6" stroke-width="1.5"/>
    <circle cx="60"  cy="188" r="10" fill="#3b82f6" opacity="0.6"/>
    <circle cx="140" cy="188" r="10" fill="#3b82f6" opacity="0.6"/>
    <line x1="310" y1="134" x2="280" y2="178" stroke="#22c55e" stroke-width="1.5"/>
    <line x1="310" y1="134" x2="340" y2="178" stroke="#22c55e" stroke-width="1.5"/>
    <circle cx="280" cy="188" r="10" fill="#22c55e" opacity="0.6"/>
    <circle cx="340" cy="188" r="10" fill="#22c55e" opacity="0.6"/>
    <!-- category count badge -->
    <rect x="130" y="220" width="140" height="28" rx="14" fill="#22c55e" opacity="0.2"/>
    <text x="200" y="239" font-family="monospace" font-size="13" fill="#22c55e" text-anchor="middle">515+ Skills · 16 Categories</text>
  </g>
  <!-- logo: tree sapling -->
  <g transform="translate(80,80)" filter="url(#glow)">
    <circle cx="60" cy="60" r="56" fill="#071009" stroke="url(#acc)" stroke-width="3"/>
    <!-- trunk -->
    <rect x="56" y="62" width="8" height="32" rx="3" fill="url(#acc)"/>
    <!-- canopy layers -->
    <polygon points="60,20 84,55 36,55" fill="url(#acc)" opacity="0.95"/>
    <polygon points="60,34 80,62 40,62" fill="url(#acc)" opacity="0.7"/>
    <!-- roots -->
    <path d="M56 94 Q44 100 38 106" stroke="url(#acc)" stroke-width="2.5" fill="none"/>
    <path d="M64 94 Q76 100 82 106" stroke="url(#acc)" stroke-width="2.5" fill="none"/>
    <!-- node dots -->
    <circle cx="60" cy="20" r="4" fill="#86efac"/>
    <circle cx="84" cy="55" r="3" fill="#22c55e" opacity="0.7"/>
    <circle cx="36" cy="55" r="3" fill="#22c55e" opacity="0.7"/>
  </g>
  <!-- wordmark -->
  <text x="222" y="95" font-family="sans-serif" font-size="14" fill="#22c55e" opacity="0.6" letter-spacing="5">AI AGENT SKILL OS</text>
  <text x="218" y="178" font-family="Arial Black,'Arial Bold',sans-serif" font-size="76" font-weight="900" letter-spacing="-2" fill="#e8fdf0">Skills Tree</text>
  <text x="222" y="215" font-family="sans-serif" font-size="19" fill="url(#acc)" letter-spacing="2" opacity="0.9">BUILD SMARTER AGENTS, FASTER</text>
  <rect x="220" y="233" width="500" height="2" fill="url(#acc)" opacity="0.45"/>
  <!-- chips -->
  <rect x="222" y="250" width="120" height="28" rx="14" fill="#22c55e" opacity="0.15"/>
  <text x="282" y="269" font-family="sans-serif" font-size="13" fill="#22c55e" text-anchor="middle">515+ Skills</text>
  <rect x="354" y="250" width="130" height="28" rx="14" fill="#3b82f6" opacity="0.15"/>
  <text x="419" y="269" font-family="sans-serif" font-size="13" fill="#86efac" text-anchor="middle">16 Categories</text>
  <rect x="496" y="250" width="120" height="28" rx="14" fill="#a78bfa" opacity="0.15"/>
  <text x="556" y="269" font-family="sans-serif" font-size="13" fill="#c4b5fd" text-anchor="middle">Benchmarked</text>
</svg>