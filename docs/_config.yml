# GitHub Pages Jekyll configuration
title: "AI Agent Skills Tree"
description: "A comprehensive, open-source taxonomy of AI agent capabilities — 515+ skills across 16 categories."
url: "https://samotech.github.io"
baseurl: "/skills-tree"
repository: "SamoTech/skills-tree"

# Keep assets/ and all docs files as-is (no Jekyll processing)
include:
  - assets

# Exclude non-docs content from Jekyll build
exclude:
  - skills/
  - systems/
  - blueprints/
  - benchmarks/
  - labs/
  - meta/
  - CONTRIBUTING.md
  - SECURITY.md
  - SPONSORS.md
  - LICENSE
  - README.md

# Plugins
plugins:
  - jekyll-github-metadata

# SEO & social
author:
  name: "SamoTech"
  url: "https://github.com/SamoTech"

twitter:
  username: samotech

defaults:
  - scope:
      path: ""
    values:
      layout: null

# Allow SVG and other asset types
# Jekyll copies unknown file types untouched
