# ============================================================
# auto-label.yml
# Auto-labels PRs and issues based on changed paths and title.
# ============================================================
name: 🏷️ Auto Label

on:
  pull_request:
    types: [opened, synchronize, edited]
  issues:
    types: [opened, edited]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label-pr:
    name: Label pull request
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml

  label-issue:
    name: Label issue by title
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body  = (context.payload.issue.body || '').toLowerCase();
            const text  = title + ' ' + body;
            const labels = [];

            if (/\bbug\b|broken|error|fail|not working/.test(text))  labels.push('bug');
            if (/\bfeature\b|request|add|new skill|suggestion/.test(text)) labels.push('enhancement');
            if (/\bdoc(s|umentation)?\b/.test(text)) labels.push('documentation');
            if (/\bsecurity\b|vuln|cve/.test(text))  labels.push('security');
            if (/\bdown\b|outage|unavailable/.test(text)) labels.push('uptime-alert');
            if (/\bquestion\b|how|help/.test(text))  labels.push('question');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels
              });
            }
