name: Skill Version Badge

on:
  push:
    branches: [main]
    paths:
      - 'skills/**/*.md'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  version-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Detect version changes and apply Battle-Tested label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import subprocess, os, re, json

          repo = os.environ["REPO"]
          token = os.environ["GH_TOKEN"]

          # Get changed skill files in this push
          result = subprocess.run(
              ["git", "diff", "--name-only", "HEAD~1", "HEAD"],
              capture_output=True, text=True
          )
          changed = [f for f in result.stdout.strip().splitlines() if f.startswith("skills/") and f.endswith(".md")]

          v3_upgrades = []

          for filepath in changed:
              if not os.path.exists(filepath):
                  continue
              with open(filepath) as fh:
                  content = fh.read()
              m = re.search(r'\*\*Version:\*\*\s*`?(v\d+)`?', content, re.IGNORECASE)
              if m and m.group(1).lower() == "v3":
                  skill_name = os.path.splitext(os.path.basename(filepath))[0]
                  v3_upgrades.append(skill_name)

          if v3_upgrades:
              print(f"[skill-version-badge] v3 skills detected: {v3_upgrades}")
              # Ensure Battle-Tested label exists
              import urllib.request, urllib.error
              headers = {
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
              }
              label_payload = json.dumps({
                  "name": "Battle-Tested",
                  "color": "2ea44f",
                  "description": "This skill has reached v3 with verified examples and model comparison data"
              }).encode()
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/labels",
                  data=label_payload, headers=headers, method="POST"
              )
              try:
                  urllib.request.urlopen(req)
                  print("[skill-version-badge] Created Battle-Tested label")
              except urllib.error.HTTPError as e:
                  if e.code == 422:
                      print("[skill-version-badge] Battle-Tested label already exists")
                  else:
                      raise

              # Find recent PRs merged into main and label them
              prs_url = f"https://api.github.com/repos/{repo}/pulls?state=closed&base=main&per_page=10"
              req = urllib.request.Request(prs_url, headers=headers)
              with urllib.request.urlopen(req) as resp:
                  prs = json.loads(resp.read())

              for pr in prs:
                  if not pr.get("merged_at"):
                      continue
                  title = pr.get("title", "")
                  # Match titles like: improve: skill-name — v2→v3
                  if re.search(r'v2.*v3|v2\s*[-→>]+\s*v3', title, re.IGNORECASE):
                      pr_num = pr["number"]
                      label_url = f"https://api.github.com/repos/{repo}/issues/{pr_num}/labels"
                      req = urllib.request.Request(
                          label_url,
                          data=json.dumps(["Battle-Tested"]).encode(),
                          headers=headers, method="POST"
                      )
                      try:
                          urllib.request.urlopen(req)
                          print(f"[skill-version-badge] Labeled PR #{pr_num} as Battle-Tested")
                      except Exception as ex:
                          print(f"[skill-version-badge] Could not label PR #{pr_num}: {ex}")
              print("[skill-version-badge] Done.")
          else:
              print("[skill-version-badge] No v3 upgrades in this push. Nothing to label.")
          PYEOF
