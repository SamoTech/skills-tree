name: Used-In Tracker

on:
  issues:
    types: [opened, edited]
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update-used-in:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Collect Used-In submissions and update README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import os, re, json, urllib.request

          repo  = os.environ["REPO"]
          token = os.environ["GH_TOKEN"]

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def gh_get(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read())

          # Find issues labelled 'used-in' or titled 'Used In: '
          issues_url = (f"https://api.github.com/repos/{repo}/issues"
                        f"?state=open&labels=used-in&per_page=50")
          try:
              used_in_issues = gh_get(issues_url)
          except Exception:
              used_in_issues = []

          entries = []
          for issue in used_in_issues:
              body = issue.get("body") or ""
              # Extract project URL from body
              url_m = re.search(r'https?://\S+', body)
              if url_m:
                  project_url = url_m.group(0).rstrip(')')
                  project_name = issue["title"].replace("Used In:", "").strip()
                  entries.append(f"- [{project_name}]({project_url})")

          if not entries:
              print("[used-in] No 'used-in' issues found. Skipping README update.")
          else:
              block = (
                  "<!-- USED_IN_START -->\n"
                  "## 🌐 Used In\n\n"
                  "These projects use Skills Tree skills in production. "
                  "[Submit yours](../../issues/new?labels=used-in&title=Used+In:+Your+Project+Name)\n\n"
                  + "\n".join(entries) + "\n"
                  "<!-- USED_IN_END -->"
              )

              with open("README.md") as fh:
                  readme = fh.read()

              if "<!-- USED_IN_START -->" in readme:
                  new_readme = re.sub(
                      r'<!-- USED_IN_START -->.*?<!-- USED_IN_END -->',
                      block, readme, flags=re.DOTALL
                  )
              else:
                  new_readme = readme + "\n\n" + block + "\n"

              with open("README.md", "w") as fh:
                  fh.write(new_readme)
              print(f"[used-in] Updated README with {len(entries)} entries.")
          PYEOF

      - name: Commit README changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && echo "No change" && exit 0
          git commit -m "chore(used-in): update Used-In tracker in README [skip ci]"
          git push
