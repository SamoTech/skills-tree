# ============================================================
# pr-checks.yml
# Runs on every PR targeting main:
#   1. Validates all changed skill YAML/Markdown files
#   2. Checks that no skills were deleted without a note
#   3. Lints HTML in docs/
#   4. Spellchecks changed .md files
#   5. Posts a summary comment on the PR
# ============================================================
name: ✅ PR Checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate skill files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD > changed.txt
          cat changed.txt
          echo "files=$(cat changed.txt | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Check skill file structure
        run: |
          python3 - <<'EOF'
          import os, sys, re
          errors = []
          with open('changed.txt') as f:
              files = [l.strip() for l in f if l.strip().endswith('.md') and l.strip().startswith('skills/')]
          for path in files:
              if not os.path.exists(path):
                  continue
              with open(path) as f:
                  content = f.read()
              # Must have a H1 heading
              if not re.search(r'^# .+', content, re.MULTILINE):
                  errors.append(f'{path}: Missing H1 heading')
              # Must have skill name
              if len(content.strip()) < 50:
                  errors.append(f'{path}: File too short (< 50 chars), possibly empty')
          if errors:
              print('Validation errors:')
              for e in errors: print(f'  ❌ {e}')
              sys.exit(1)
          else:
              print(f'✅ {len(files)} skill file(s) validated OK')
          EOF

      - name: Check docs HTML
        run: |
          if grep -q 'docs/' changed.txt; then
            echo "Docs changed, running HTML checks..."
            # Check for broken local asset references
            if grep -E 'src=["\x27]\./|href=["\x27]\./assets/' docs/index.html; then
              echo "⚠️  Relative asset paths found in index.html — use raw.githubusercontent.com URLs instead"
              exit 1
            fi
            echo "✅ No relative asset paths found"
          else
            echo "No docs changes, skipping HTML check"
          fi

      - name: Post PR summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let changed = '';
            try { changed = fs.readFileSync('changed.txt', 'utf8'); } catch(e) { changed = ''; }
            const skillFiles = changed.split('\n').filter(f => f.startsWith('skills/') && f.endsWith('.md'));
            const docsFiles = changed.split('\n').filter(f => f.startsWith('docs/'));
            const body = [
              '## 🤖 PR Check Summary',
              '',
              `| Check | Files |`,
              `|---|---|`,
              `| 📁 Skill files changed | ${skillFiles.length} |`,
              `| 🌐 Docs files changed | ${docsFiles.length} |`,
              '',
              skillFiles.length > 0 ? '### Changed skills\n' + skillFiles.map(f => `- \`${f}\``).join('\n') : '',
              '',
              '*Auto-generated by PR Checks workflow*'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
