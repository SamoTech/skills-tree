name: Validate Skills

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'meta/**'
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'meta/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate skill files
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Step 1: Backfill missing "added:" field ──────────────────────────
      # Accepts both YAML frontmatter (added:) and bold-field (**Added:**).
      # Uses retry-rebase loop to avoid race conditions with concurrent workflows.
      - name: Backfill missing Added field (push to main only)
        if: github.event_name == 'push'
        run: |
          set +e
          CHANGED=0
          shopt -s globstar
          for f in skills/**/*.md; do
            [[  "$f" == *README* ]] && continue
            # Accept YAML frontmatter "added:" OR bold "**Added:**"
            if ! grep -qE '^added:' "$f" && ! grep -qE '^\*\*Added:\*\*' "$f"; then
              if grep -q '^stability:' "$f"; then
                sed -i '/^stability:/a added: "2025-03"' "$f"
              else
                sed -i '/^---$/a added: "2025-03"' "$f"
              fi
              echo "Backfilled added field: $f"
              CHANGED=1
            fi
          done
          if [ $CHANGED -eq 1 ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add skills/
            git commit -m "chore(skills): backfill missing added field [skip ci]"
            for attempt in 1 2 3; do
              git push origin main && {
                echo "✅ Backfill pushed (attempt ${attempt})."
                exit 0
              }
              echo "Push failed (attempt ${attempt}/3). Rebasing..."
              git pull --rebase origin main
              sleep $((attempt * 2))
            done
            echo "ERROR: All 3 push attempts failed."
            exit 1
          else
            echo "No backfill needed."
          fi

      # ── Step 2: Hard validation — structural sections ────────────────────
      # Accepts EITHER a Markdown heading (## Description / ### Description)
      # OR a bold-field style (**Description** / **Description:**) as generated
      # by ast-sweep stubs. Both are valid stub formats.
      # On PRs: only check files changed in this PR (prevents pre-existing stubs
      # from blocking new contributions; stubs are fixed progressively).
      # On push to main: full scan to catch anything that slipped through.
      - name: Check required sections (hard fail)
        run: |
          echo "Checking skill .md files for required sections..."
          shopt -s globstar
          FAIL=0

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'skills/**/*.md' | grep -v README || true)
            echo "PR mode — checking $(echo "$FILES" | grep -c '\.md' || echo 0) changed skill file(s)."
          else
            FILES=$(find skills -name '*.md' | grep -v README)
            echo "Push mode — full scan of all skill files."
          fi

          for f in $FILES; do
            [ -f "$f" ] || continue
            [[ "$f" == *README* ]] && continue
            if ! grep -qE '(^#{1,3} Description|^\*\*Description)' "$f"; then
              echo "::error file=$f::MISSING 'Description' section (## Description, ### Description, or **Description**)"
              FAIL=1
            fi
            if ! grep -qE '(^#{1,3} Related|^\*\*Related)' "$f"; then
              echo "::error file=$f::MISSING 'Related' section (## Related, ### Related Skills, or **Related**)"
              FAIL=1
            fi
          done
          [ $FAIL -eq 0 ] && echo "All checked skill files have required sections."
          exit $FAIL

      # ── Step 3: Soft validation — frontmatter fields (warn only) ─────────
      - name: Check frontmatter fields (warn only)
        run: |
          echo "Checking frontmatter fields (warnings only)..."
          shopt -s globstar
          WARN=0
          for f in skills/**/*.md; do
            [[ "$f" == *README* ]] && continue
            if ! grep -qE '(^category:|\*\*Category:\*\*)' "$f"; then
              echo "::warning file=$f::MISSING 'category' field"
              WARN=1
            fi
            if ! grep -qE '(^level:|\*\*Skill Level:\*\*)' "$f"; then
              echo "::warning file=$f::MISSING 'level' or 'Skill Level' field"
              WARN=1
            fi
            if ! grep -qE '(^stability:|\*\*Stability:\*\*)' "$f"; then
              echo "::warning file=$f::MISSING 'stability' field"
              WARN=1
            fi
            if ! grep -qE '(^added:|\*\*Added:\*\*)' "$f"; then
              echo "::warning file=$f::MISSING 'added' field — will be auto-backfilled on merge"
              WARN=1
            fi
          done
          [ $WARN -eq 0 ] && echo "All frontmatter fields present."
          exit 0

      # ── Step 4: Check for Example section (warn only) ────────────────────
      - name: Check for Example section (warn only)
        run: |
          shopt -s globstar
          for f in skills/**/*.md; do
            [[ "$f" == *README* ]] && continue
            if ! grep -qE '^#{1,3} (Example|Pattern|Usage)' "$f"; then
              echo "::warning file=$f::No 'Example' / 'Pattern' / 'Usage' section found"
            fi
          done
          exit 0

      # ── Step 5: Broken relative link check ──────────────────────────────
      # On PRs: only check links in files changed by this PR.
      # On push to main: check all files (catches dangling links repo-wide).
      - name: Check for broken relative links
        run: |
          echo "Checking for broken relative links..."
          FAIL=0

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'skills/**/*.md' | grep -v README || true)
            echo "PR mode — checking links in $(echo "$FILES" | grep -c '\.md' || echo 0) changed file(s)."
          else
            shopt -s globstar
            FILES=$(find skills -name '*.md' | grep -v README)
            echo "Push mode — full link scan."
          fi

          for f in $FILES; do
            [ -f "$f" ] || continue
            [[ "$f" == *README* ]] && continue
            dir=$(dirname "$f")
            links=$(grep -oP '\(\.\./[^)]+\.md\)' "$f" | tr -d '()')
            for link in $links; do
              target="$dir/$link"
              resolved=$(realpath --relative-to=. "$target" 2>/dev/null)
              if [ ! -f "$resolved" ]; then
                echo "::error file=$f::Broken link → $link"
                FAIL=1
              fi
            done
          done
          [ $FAIL -eq 0 ] && echo "No broken links found in checked files."
          exit $FAIL
