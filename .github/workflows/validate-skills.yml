name: Validate Skills

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'meta/**'
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'meta/**'

env:
  # Opt into Node.js 24 now to silence the Node 20 deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate skill files
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Step 1: Backfill missing "Added:" field ──────────────────────────
      # Skill files were created before the Added field was introduced.
      # On push to main we auto-insert "**Added:** 2025-03" after the
      # Stability line if the field is absent.
      - name: Backfill missing Added field (push to main only)
        if: github.event_name == 'push'
        run: |
          set +e
          CHANGED=0
          shopt -s globstar
          for f in skills/**/*.md; do
            [[ "$f" == *README* ]] && continue
            if ! grep -q '^\*\*Added:\*\*' "$f" && ! grep -q '^Added:' "$f"; then
              sed -i '/^\*\*Stability:\*\*/a **Added:** 2025-03' "$f"
              echo "Backfilled Added field: $f"
              CHANGED=1
            fi
          done
          if [ $CHANGED -eq 1 ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add skills/
            git commit -m "chore(skills): backfill missing Added field [skip ci]"
            git push
          else
            echo "No backfill needed."
          fi

      # ── Step 2: Hard validation — structural sections ────────────────────
      # Skill files use ## (h2) headings for Description and Related sections.
      # The validator accepts both the inline-metadata format (single-line
      # "Category: … | Level: …") and the bold-field format (**Category:**).
      # Missing Description or Related section = build fails.
      - name: Check required sections (hard fail)
        run: |
          echo "Checking skill .md files for required sections..."
          shopt -s globstar
          FAIL=0
          for f in skills/**/*.md; do
            [[ "$f" == *README* ]] && continue
            # Accept ## Description OR ### Description (both heading levels)
            if ! grep -qE '^#{1,3} Description' "$f"; then
              echo "::error file=$f::MISSING 'Description' section (## Description or ### Description)"
              FAIL=1
            fi
            # Accept ## Related OR ### Related Skills OR ## Related Skills
            if ! grep -qE '^#{1,3} Related' "$f"; then
              echo "::error file=$f::MISSING 'Related' section (## Related or ### Related Skills)"
              FAIL=1
            fi
          done
          [ $FAIL -eq 0 ] && echo "All skill files have required sections."
          exit $FAIL

      # ── Step 3: Soft validation — frontmatter fields (warn only) ─────────
      - name: Check frontmatter fields (warn only)
        run: |
          echo "Checking frontmatter fields (warnings only)..."
          shopt -s globstar
          WARN=0
          for f in skills/**/*.md; do
            [[ "$f" == *README* ]] && continue
            # Accept both inline (Category: foo) and bold (**Category:**) formats
            if ! grep -qE '(Category:|^\*\*Category:\*\*)' "$f"; then
              echo "::warning file=$f::MISSING 'Category' field"
              WARN=1
            fi
            if ! grep -qE '(Level:|^\*\*Skill Level:\*\*)' "$f"; then
              echo "::warning file=$f::MISSING 'Level' or 'Skill Level' field"
              WARN=1
            fi
            if ! grep -qE '(Stability:|^\*\*Stability:\*\*)' "$f"; then
              echo "::warning file=$f::MISSING 'Stability' field"
              WARN=1
            fi
            if ! grep -qE '^(Added:|^\*\*Added:\*\*)' "$f"; then
              echo "::warning file=$f::MISSING 'Added' field — will be auto-backfilled on merge"
              WARN=1
            fi
          done
          [ $WARN -eq 0 ] && echo "All frontmatter fields present."
          exit 0

      # ── Step 4: Check for Example section (warn only) ────────────────────
      - name: Check for Example section (warn only)
        run: |
          shopt -s globstar
          for f in skills/**/*.md; do
            [[ "$f" == *README* ]] && continue
            if ! grep -qE '^#{1,3} (Example|Pattern|Usage)' "$f"; then
              echo "::warning file=$f::No 'Example' / 'Pattern' / 'Usage' section found"
            fi
          done
          exit 0

      # ── Step 5: Broken relative link check ──────────────────────────────
      - name: Check for broken relative links
        run: |
          echo "Checking for broken relative links..."
          shopt -s globstar
          FAIL=0
          for f in skills/**/*.md; do
            dir=$(dirname "$f")
            links=$(grep -oP '\(\.\./[^)]+\.md\)' "$f" | tr -d '()')
            for link in $links; do
              target="$dir/$link"
              resolved=$(realpath --relative-to=. "$target" 2>/dev/null)
              if [ ! -f "$resolved" ]; then
                echo "::error file=$f::Broken link → $link"
                FAIL=1
              fi
            done
          done
          [ $FAIL -eq 0 ] && echo "No broken links found."
          exit $FAIL
