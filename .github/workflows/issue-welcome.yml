# ============================================================
# issue-welcome.yml
# Posts a welcome comment on every new issue and first-time
# PR with contribution guidance.
# ============================================================
name: 👋 Welcome New Contributors

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const isIssue = context.eventName === 'issues';
            const author  = isIssue
              ? context.payload.issue.user.login
              : context.payload.pull_request.user.login;
            const number  = isIssue
              ? context.payload.issue.number
              : context.payload.pull_request.number;

            // Check if this is their first issue/PR
            const search = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} author:${author}`
            });
            const isFirst = search.data.total_count <= 1;

            if (!isFirst) return; // Only welcome first-timers

            const body = isIssue
              ? `👋 Thanks for opening your first issue, @${author}!\n\nA maintainer will review it soon. In the meantime:\n- 📖 Check [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) for guidelines\n- 🔍 Search existing issues to avoid duplicates\n- 📋 Use the [glossary](../blob/main/meta/glossary.md) for skill terminology`
              : `👋 Thanks for your first PR, @${author}! 🎉\n\nWe'll review it shortly. Please make sure:\n- [ ] Skill files follow the naming convention \`NN-skill-name.md\`\n- [ ] Each skill has a clear H1 heading and description\n- [ ] Related skills reference each other with links\n\nSee [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) for the full checklist.`;

            // FIX: removed dead-code ternary that always resolved to the same branch.
            // Both issue and PR welcome messages use issues.createComment (correct for both).
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              body
            });
