name: AST Dependency Sweep

# Extracts import statements from skill code blocks, validates against PyPI,
# generates the CycloneDX SBOM, and opens a draft PR with machine-inferred
# frontmatter + badge updates.
#
# Run manually via workflow_dispatch (not on a schedule — this is a one-time
# bootstrap step, then re-run when large batches of new skills are added).

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — print results only, do not write files or open PR'
        type: boolean
        default: true
      skills_path:
        description: 'Skills directory to scan (default: skills/)'
        type: string
        default: 'skills/'

jobs:
  sweep:
    name: AST Import Extraction + PyPI Validation
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install httpx

      - name: Run AST sweep
        run: |
          DRY_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          python tools/ast_sweep.py \
            --skills-root "${{ inputs.skills_path }}" \
            --badge-output badge-data-output \
            --sbom-output meta/skills-sbom.cdx.json \
            $DRY_FLAG

      - name: Open draft PR with sweep results
        if: inputs.dry_run == false
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const branch = `feat/ast-sweep-${Date.now()}`;

            // Create branch
            const mainSha = context.sha;
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/heads/${branch}`,
              sha: mainSha,
            });

            // Commit SBOM
            const sbom = fs.readFileSync('meta/skills-sbom.cdx.json', 'base64');
            const existingSbom = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'meta/skills-sbom.cdx.json',
            }).catch(() => null);

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'meta/skills-sbom.cdx.json',
              message: 'chore(sbom): update CycloneDX SBOM from AST sweep',
              content: sbom,
              branch: branch,
              sha: existingSbom?.data?.sha,
            });

            // Read and post report as PR body
            const report = fs.readFileSync('sweep-report.md', 'utf8');

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'chore(deps): seed dependency frontmatter via AST sweep — DRAFT',
              body: report + '\n\n---\n> ⚠️ This is a machine-generated draft. Do NOT merge without reviewing Orange badges. See `meta/badge-states.md`.',
              head: branch,
              base: 'main',
              draft: true,
            });

            console.log(`Draft PR created: ${pr.data.html_url}`);
