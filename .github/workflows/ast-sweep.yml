name: AST Dependency Sweep

# Extracts import statements from skill code blocks, validates against PyPI,
# generates the CycloneDX SBOM, and:
#   1. Commits Yellow badge JSONs to `docs/badges/` on `main` IMMEDIATELY.
#   2. Opens a DRAFT PR to `main` with the SBOM + sweep report.
#
# PREREQUISITE: Repo Settings → Actions → General → Workflow permissions
#   must have "Allow GitHub Actions to create and approve pull requests" enabled.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — print results only, do not write files or open PR'
        type: boolean
        default: false
      skills_path:
        description: 'Skills directory to scan (default: skills/)'
        type: string
        default: 'skills/'
      push_badges_immediately:
        description: 'Commit Yellow badge JSONs to docs/badges/ on main now (before PR merges)'
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


# Serialize runs of THIS workflow on the same ref so concurrent
# scheduled triggers do not race when pushing back to main.
# Distinct workflow classes (graph, exports, badges, …) intentionally
# use different groups so they can still run in parallel.
concurrency:
  group: ast-sweep-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sweep:
    name: AST Import Extraction + PyPI Validation
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install httpx

      # Clean output dir so stale/renamed skill badges don't persist
      - name: Clean badge-data-output
        run: rm -rf badge-data-output && mkdir -p badge-data-output

      - name: Run AST sweep
        run: |
          DRY_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          echo "dry_run input = '${{ inputs.dry_run }}' | DRY_FLAG = '${DRY_FLAG}'"
          python tools/ast_sweep.py \
            --skills-root "${{ inputs.skills_path }}" \
            --badge-output badge-data-output \
            --sbom-output meta/skills-sbom.cdx.json \
            $DRY_FLAG

      # FIX: boolean workflow_dispatch inputs arrive as strings "true"/"false",
      # so compare with != 'true' not == false.
      - name: Ensure sweep-report.md exists
        if: inputs.dry_run != 'true'
        run: |
          if [ ! -f sweep-report.md ]; then
            echo "## AST Sweep Report" > sweep-report.md
            echo "" >> sweep-report.md
            BADGE_COUNT=$(find badge-data-output -name '*.json' 2>/dev/null | wc -l | tr -d ' ')
            echo "- **Badges generated:** ${BADGE_COUNT}" >> sweep-report.md
            echo "- **Run date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> sweep-report.md
            echo "" >> sweep-report.md
            echo "_Auto-generated fallback report (ast_sweep.py did not produce sweep-report.md)_" >> sweep-report.md
          fi

      # ----------------------------------------------------------------
      # COMMIT BADGE JSONs TO docs/badges/ ON MAIN
      # ----------------------------------------------------------------
      - name: Commit Yellow badges to docs/badges/ on main (pre-merge, with retry-rebase)
        # FIX: boolean inputs are strings — use != 'true' not == false
        if: inputs.dry_run != 'true' && inputs.push_badges_immediately != 'false'
        run: |
          JSON_COUNT=$(find badge-data-output -name '*.json' 2>/dev/null | wc -l | tr -d ' ')
          if [ "$JSON_COUNT" = "0" ]; then
            echo "No badge JSONs generated. Skipping commit."
            exit 0
          fi

          mkdir -p docs/badges

          python3 - <<'PYEOF'
          import json
          from pathlib import Path

          src  = Path("badge-data-output")
          dest = Path("docs/badges")
          dest.mkdir(parents=True, exist_ok=True)

          written = skipped = 0
          for new_file in src.glob("*.json"):
              dest_file = dest / new_file.name
              new_badge = json.loads(new_file.read_text())
              if dest_file.exists():
                  existing = json.loads(dest_file.read_text())
                  # Never overwrite CVE/critical or Green (verified) badges
                  if existing.get("color") in ("critical", "22c55e") or "CVE" in existing.get("message", ""):
                      skipped += 1
                      continue
              dest_file.write_text(json.dumps(new_badge, indent=2))
              written += 1
          print(f"Wrote {written} badge JSONs to docs/badges/. Skipped {skipped} advisory/verified.")
          PYEOF

          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/badges/
          git diff --staged --quiet && echo "No badge changes to commit." && exit 0

          SWEEP_SHA=$(git rev-parse --short HEAD)
          git commit -m "sweep(badges): commit machine-inferred badge JSONs to docs/badges/ [sweep@${SWEEP_SHA}]"

          for attempt in 1 2 3; do
            git push origin main && {
              echo "Badges committed to docs/badges/ on main (attempt ${attempt})."
              exit 0
            }
            echo "Push rejected (attempt ${attempt}/3). Pulling and rebasing..."
            git pull --rebase origin main
            sleep $((attempt * 2))
          done
          echo "ERROR: Badge commit to main failed after 3 attempts."
          exit 1

      # ----------------------------------------------------------------
      # DRAFT PR: SBOM + sweep report to main
      # ----------------------------------------------------------------
      - name: Open draft PR with sweep results
        # FIX: boolean inputs are strings
        if: inputs.dry_run != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const branch = `feat/ast-sweep-${Date.now()}`;

            // FIX: fetch fresh HEAD SHA — context.sha may be stale if the badge
            // commit step pushed a new commit to main before this step runs.
            const mainRef = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'heads/main',
            });
            const mainSha = mainRef.data.object.sha;

            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/heads/${branch}`,
              sha: mainSha,
            });

            const sbom = fs.readFileSync('meta/skills-sbom.cdx.json').toString('base64');
            const existingSbom = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'meta/skills-sbom.cdx.json',
            }).catch(() => null);

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'meta/skills-sbom.cdx.json',
              message: 'chore(sbom): update CycloneDX SBOM from AST sweep',
              content: sbom,
              branch: branch,
              sha: existingSbom?.data?.sha,
            });

            const reportPath = 'sweep-report.md';
            const report = fs.existsSync(reportPath)
              ? fs.readFileSync(reportPath, 'utf8')
              : '_(No sweep-report.md found \u2014 see workflow logs for details.)_';

            try {
              const pr = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'chore(deps): seed dependency frontmatter via AST sweep \u2014 DRAFT',
                body: [
                  report,
                  '',
                  '---',
                  '> \u26a0\ufe0f This is a machine-generated draft. Do NOT merge without reviewing Orange badges.',
                  '> See `meta/badge-states.md` for the verification PR template.',
                  '>',
                  '> **Phantom badge contract:** Yellow badge JSONs are already live in `docs/badges/` on `main`.',
                  '> **If you close this PR without merging**, `revoke-phantom-badges.yml` will',
                  '> automatically reset affected badges to `unscanned` (grey) within ~60 seconds.',
                ].join('\n'),
                head: branch,
                base: 'main',
                draft: true,
              });
              console.log(`\u2705 Draft PR created: ${pr.data.html_url}`);
            } catch (err) {
              if (err.message && err.message.includes('not permitted to create or approve pull requests')) {
                core.warning(
                  'PR creation blocked by repo permissions.\n' +
                  'Fix: Settings \u2192 Actions \u2192 General \u2192 Workflow permissions \u2192 ' +
                  'enable "Allow GitHub Actions to create and approve pull requests"'
                );
              } else {
                throw err;
              }
            }
