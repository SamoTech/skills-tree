name: AST Dependency Sweep

# Extracts import statements from skill code blocks, validates against PyPI,
# generates the CycloneDX SBOM, and:
#   1. Pushes Yellow badge JSONs to `badge-data` branch IMMEDIATELY (pre-merge)
#      so the site shows Yellow even while the draft PR is under review.
#   2. Opens a DRAFT PR to `main` with the SBOM + sweep report.
#
# PHANTOM BADGE CONTRACT:
#   Pre-merge Yellow badges are speculative. If the draft PR is closed WITHOUT
#   merging, `revoke-phantom-badges.yml` fires and resets affected badges to
#   unscanned (grey). The site never shows a stale Yellow for an abandoned PR.
#
# COLLISION SAFETY: pre-merge push step uses retry-rebase loop (max 3 attempts).

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — print results only, do not write files or open PR'
        type: boolean
        default: false
      skills_path:
        description: 'Skills directory to scan (default: skills/)'
        type: string
        default: 'skills/'
      push_badges_immediately:
        description: 'Push Yellow badge JSONs to badge-data branch now (before PR merges)'
        type: boolean
        default: true

jobs:
  sweep:
    name: AST Import Extraction + PyPI Validation
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install httpx

      - name: Run AST sweep
        run: |
          DRY_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          echo "dry_run input = '${{ inputs.dry_run }}' | DRY_FLAG = '${DRY_FLAG}'"
          python tools/ast_sweep.py \
            --skills-root "${{ inputs.skills_path }}" \
            --badge-output badge-data-output \
            --sbom-output meta/skills-sbom.cdx.json \
            $DRY_FLAG

      - name: Ensure sweep-report.md exists
        if: inputs.dry_run == false
        run: |
          if [ ! -f sweep-report.md ]; then
            echo "## AST Sweep Report" > sweep-report.md
            echo "" >> sweep-report.md
            BADGE_COUNT=$(find badge-data-output -name '*.json' 2>/dev/null | wc -l | tr -d ' ')
            echo "- **Badges generated:** ${BADGE_COUNT}" >> sweep-report.md
            echo "- **Run date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> sweep-report.md
            echo "" >> sweep-report.md
            echo "_Auto-generated fallback report (ast_sweep.py did not produce sweep-report.md)_" >> sweep-report.md
          fi

      # ----------------------------------------------------------------
      # PRE-MERGE BADGE PUSH
      # ----------------------------------------------------------------
      - name: Push Yellow badges to badge-data branch (pre-merge, with retry-rebase)
        if: inputs.dry_run == false && inputs.push_badges_immediately == true
        run: |
          JSON_COUNT=$(find badge-data-output -name '*.json' 2>/dev/null | wc -l | tr -d ' ')
          if [ "$JSON_COUNT" = "0" ]; then
            echo "No badge JSONs generated. Skipping badge-data push."
            exit 0
          fi

          git clone --depth 1 \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
            badge-data-branch \
            --branch badge-data \
            2>/dev/null || (
              mkdir badge-data-branch && cd badge-data-branch &&
              git init &&
              git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git &&
              git checkout --orphan badge-data
            )

          python3 - <<'PYEOF'
          import json
          from pathlib import Path

          src  = Path("badge-data-output")
          dest = Path("badge-data-branch")
          dest.mkdir(exist_ok=True)

          written = skipped = 0
          for new_file in src.glob("*.json"):
              dest_file = dest / new_file.name
              new_badge = json.loads(new_file.read_text())
              if dest_file.exists():
                  existing = json.loads(dest_file.read_text())
                  if existing.get("color") in ("critical", "22c55e"):
                      skipped += 1
                      continue
                  if existing.get("color") == "22c55e" and new_badge.get("color") == "yellow":
                      skipped += 1
                      continue
              dest_file.write_text(json.dumps(new_badge, indent=2))
              written += 1
          print(f"Wrote {written} badge JSONs. Skipped {skipped} advisory/verified.")
          PYEOF

          cd badge-data-branch
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add -A
          git diff --staged --quiet && echo "No badge changes to push." && exit 0

          SWEEP_SHA=$(git -C .. rev-parse --short HEAD 2>/dev/null || echo 'manual')
          git commit -m "sweep(badges): machine-inferred badges pushed pre-merge from sweep@${SWEEP_SHA}"

          for attempt in 1 2 3; do
            git push origin badge-data && {
              echo "✅ Pre-merge badge JSONs pushed to badge-data (attempt ${attempt})."
              exit 0
            }
            echo "Push rejected (attempt ${attempt}/3). Fetching and rebasing..."
            git fetch origin badge-data
            git rebase origin/badge-data || {
              git diff --name-only --diff-filter=U | grep '\.json$' | xargs -I{} git checkout --ours {}
              git add -A
              git rebase --continue
            }
            sleep $((attempt * 2))
          done
          echo "ERROR: Pre-merge badge push failed after 3 attempts."
          exit 1

      # ----------------------------------------------------------------
      # DRAFT PR: SBOM + sweep report to main
      # ----------------------------------------------------------------
      - name: Open draft PR with sweep results
        if: inputs.dry_run == false
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const branch = `feat/ast-sweep-${Date.now()}`;

            const mainSha = context.sha;
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/heads/${branch}`,
              sha: mainSha,
            });

            const sbom = fs.readFileSync('meta/skills-sbom.cdx.json').toString('base64');
            const existingSbom = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'meta/skills-sbom.cdx.json',
            }).catch(() => null);

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'meta/skills-sbom.cdx.json',
              message: 'chore(sbom): update CycloneDX SBOM from AST sweep',
              content: sbom,
              branch: branch,
              sha: existingSbom?.data?.sha,
            });

            const reportPath = 'sweep-report.md';
            const report = fs.existsSync(reportPath)
              ? fs.readFileSync(reportPath, 'utf8')
              : '_(No sweep-report.md found — see workflow logs for details.)_';

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'chore(deps): seed dependency frontmatter via AST sweep \u2014 DRAFT',
              body: [
                report,
                '',
                '---',
                '> \u26a0\ufe0f This is a machine-generated draft. Do NOT merge without reviewing Orange badges.',
                '> See `meta/badge-states.md` for the verification PR template.',
                '>',
                '> **Phantom badge contract:** Yellow badge JSONs are already live on `badge-data`.',
                '> **If you close this PR without merging**, `revoke-phantom-badges.yml` will',
                '> automatically reset affected badges to `unscanned` (grey) within ~60 seconds.',
              ].join('\n'),
              head: branch,
              base: 'main',
              draft: true,
            });

            console.log(`Draft PR created: ${pr.data.html_url}`);
            console.log('Yellow badges already live. Phantom revocation active if PR is abandoned.');
