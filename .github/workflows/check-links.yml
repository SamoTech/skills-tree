name: Check External Links

on:
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  linkcheck:
    name: Check external links
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdown-link-check
        run: npm install -g markdown-link-check

      # H-3 FIX: removed || true so broken links actually fail the workflow.
      # --retry 3 handles transient network timeouts without false failures.
      # Results are collected per-file; final exit code reflects any failures.
      - name: Check links in all Markdown files
        run: |
          FAIL=0
          while IFS= read -r -d '' file; do
            markdown-link-check "$file" \
              --config .github/mlc-config.json \
              --quiet \
              --retry 3 || FAIL=1
          done < <(find . -name '*.md' ! -path './node_modules/*' -print0)
          exit $FAIL
