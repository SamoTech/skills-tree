name: JSON-LD Export

on:
  push:
    paths:
      - "skills/**"
  schedule:
    # Every Monday at 04:00 UTC
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run export (JSON, YAML, Schema, JSON-LD)
        run: python3 tools/export_skills.py

      - name: Commit generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(api): auto-update JSON, YAML, JSON-LD exports [skip ci]"
            git push
          fi
