name: Update Skill Count Badge

on:
  push:
    branches: [main]
    paths:
      - 'skills/**/*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  count-and-update:
    name: Recount skills & sync README badge
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Count skill files
        id: count
        run: |
          # Count all .md files under skills/ excluding README files
          COUNT=$(find skills/ -name '*.md' ! -name 'README.md' | wc -l | tr -d ' ')
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Skill count: $COUNT"

      - name: Update skill count in README
        run: |
          COUNT=${{ steps.count.outputs.count }}
          # Update the shields.io badge label in README
          # Matches pattern: label=515%2B%20Skills or similar
          sed -i "s|label=[0-9]*%2B%20Skills|label=${COUNT}%2B%20Skills|g" README.md
          # Also update any plain-text skill count mentions like "515+"
          # Only replace standalone count in the stats/badges area
          sed -i "s|\(Skills\).*\([0-9]\{3,\}+\)|\1 ${COUNT}+|g" README.md || true

      - name: Update skill count in docs/index.html
        run: |
          COUNT=${{ steps.count.outputs.count }}
          # Update the hero stat in the docs site
          sed -i "s|data-target=\"[0-9]*\"|data-target=\"${COUNT}\"|1" docs/index.html || true

      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md docs/index.html
          if git diff --cached --quiet; then
            echo 'Skill count unchanged — no commit needed.'
          else
            git commit -m "chore: sync skill count badge → ${{ steps.count.outputs.count }}+"
            git push
          fi
