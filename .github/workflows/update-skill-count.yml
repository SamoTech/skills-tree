name: Update Skill Count Badge

on:
  push:
    branches: [main]
    paths:
      - 'skills/**/*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  count-and-update:
    name: Count skills & update README
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Count skill files
        id: count
        run: |
          COUNT=$(find skills/ -name '*.md' ! -name 'README.md' | wc -l | tr -d ' ')
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Found $COUNT skill files"

      - name: Count categories
        id: cats
        run: |
          CATS=$(find skills/ -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d ' ')
          echo "count=$CATS" >> $GITHUB_OUTPUT

      - name: Patch README & docs
        run: |
          SKILLS=${{ steps.count.outputs.count }}
          CATS=${{ steps.cats.outputs.count }}

          # Update shields.io badge URLs for skills count
          sed -i "s|skills-[0-9]*%2B-|skills-${SKILLS}%2B-|g" README.md
          sed -i "s|Skills-[0-9]*%2B|Skills-${SKILLS}%2B|g" README.md

          # Update categories count badge
          sed -i "s|categories-[0-9]*-|categories-${CATS}-|g" README.md

          # Update docs hero counter
          sed -i "s|data-target=\"[0-9]*\"|data-target=\"${SKILLS}\"|1" docs/index.html || true

          echo "Updated README: $SKILLS skills, $CATS categories"

      - name: Commit & push with rebase retry
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/index.html
          if git diff --cached --quiet; then
            echo "Skill count unchanged — no commit needed."
            exit 0
          fi
          git commit -m "chore: sync skill count badges → ${{ steps.count.outputs.count }} skills"
          for attempt in 1 2 3 4 5; do
            git push origin main && {
              echo "✅ Pushed (attempt ${attempt})."
              exit 0
            }
            echo "Push rejected (attempt ${attempt}/5) — rebasing..."
            git pull --rebase origin main
            sleep $((attempt * 2))
          done
          echo "ERROR: All push attempts failed."
          exit 1
