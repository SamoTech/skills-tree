name: Version Stats

on:
  push:
    branches: [main]
    paths:
      - 'skills/**/*.md'
  schedule:
    - cron: '0 4 * * 1'  # Monday 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-versioning-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Count skill versions and update VERSIONING.md
        run: |
          python3 - <<'PYEOF'
          import os, re, glob

          counts = {"v1": 0, "v2": 0, "v3": 0, "none": 0}

          for filepath in glob.glob("skills/**/*.md", recursive=True):
              with open(filepath) as fh:
                  content = fh.read()
              m = re.search(r'\*\*Version:\*\*\s*`?(v\d+)`?', content, re.IGNORECASE)
              if m:
                  v = m.group(1).lower()
                  if v in counts:
                      counts[v] += 1
                  else:
                      counts["none"] += 1
              else:
                  counts["none"] += 1

          total = sum(counts.values())

          def pct(n):
              return f"{(n/total*100):.1f}%" if total else "0%"

          table = (
              "| Version | Count | % of Total |\n"
              "|---|---|---|\n"
              f"| v1 (Stub) | {counts['v1']} | {pct(counts['v1'])} |\n"
              f"| v2 (Expanded) | {counts['v2']} | {pct(counts['v2'])} |\n"
              f"| v3 (Battle-Tested) | {counts['v3']} | {pct(counts['v3'])} |\n"
              f"| No version tag | {counts['none']} | {pct(counts['none'])} |"
          )

          with open("meta/VERSIONING.md") as fh:
              doc = fh.read()

          new_doc = re.sub(
              r'(## Current Version Distribution\n>.*?\n\n)\|.*?(?=\n---)',
              lambda m: m.group(1) + table,
              doc,
              flags=re.DOTALL
          )

          if new_doc != doc:
              with open("meta/VERSIONING.md", "w") as fh:
                  fh.write(new_doc)
              print(f"[version-stats] Updated: v1={counts['v1']} v2={counts['v2']} v3={counts['v3']} none={counts['none']}")
          else:
              print("[version-stats] No change needed.")
          PYEOF

      - name: Commit updated VERSIONING.md
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add meta/VERSIONING.md
          git diff --cached --quiet && echo "No change" && exit 0
          git commit -m "chore(versioning): auto-update version distribution stats [skip ci]"
          for attempt in 1 2 3; do
            git push origin main && exit 0
            git pull --rebase origin main
            sleep $((attempt * 2))
          done
          echo "ERROR: Push failed after 3 attempts."
          exit 1
