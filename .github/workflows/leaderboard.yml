name: Update Leaderboard

on:
  schedule:
    - cron: '0 0 * * 1'  # Every Monday at 00:00 UTC
  workflow_dispatch:      # Allow manual trigger

permissions:
  contents: write
  pull-requests: read

jobs:
  update-leaderboard:
    name: Rebuild LEADERBOARD.md
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests PyGithub python-dateutil

      - name: Generate leaderboard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import os, json, re, glob
          from datetime import datetime, timedelta, timezone
          from github import Github
          from collections import defaultdict

          g = Github(os.environ['GITHUB_TOKEN'])
          repo = g.get_repo(os.environ['REPO'])
          now = datetime.now(timezone.utc)
          week_ago = now - timedelta(days=7)
          week_str = now.strftime('%Y-%m-%d')

          # --- Collect PR data (FIX: stop iterating once PRs are older than 30 days) ---
          cutoff_alltime = now - timedelta(days=365)
          contributor_stats = defaultdict(lambda: {'added': 0, 'improved': 0, 'prs': 0})
          skill_activity = defaultdict(int)
          upgraded_skills = []

          for pr in repo.get_pulls(state='closed', sort='updated', direction='desc'):
              if pr.updated_at and pr.updated_at < cutoff_alltime:
                  break  # FIX: PRs sorted by updated desc — stop once we're past 1 year
              if not pr.merged_at:
                  continue
              author = pr.user.login
              contributor_stats[author]['prs'] += 1
              if pr.merged_at > week_ago:
                  title = pr.title.lower()
                  if title.startswith('feat:') or 'new skill' in title:
                      contributor_stats[author]['added'] += 1
                  if title.startswith('improve:') or 'v1→v2' in title or 'v2→v3' in title:
                      contributor_stats[author]['improved'] += 1
                      m = re.search(r'improve:\s*\[?([\w-]+)\]?', pr.title, re.IGNORECASE)
                      if m:
                          skill_name = m.group(1)
                          skill_activity[skill_name] += 2
                          vm = re.search(r'v(\d)→v(\d)', pr.title)
                          if vm:
                              upgraded_skills.append({
                                  'skill': skill_name,
                                  'from': f"v{vm.group(1)}",
                                  'to': f"v{vm.group(2)}",
                                  'contributor': f"@{author}"
                              })
                  for f in pr.get_files():
                      if f.filename.startswith('skills/'):
                          parts = f.filename.split('/')
                          if len(parts) >= 3:
                              skill_activity[parts[2].replace('.md', '')] += 1

          # Top 5 skills this week
          top_skills = sorted(skill_activity.items(), key=lambda x: x[1], reverse=True)[:5]

          # Battle-tested (v3) skills
          battle_tested = []
          try:
              contents = repo.get_contents('skills')
              while contents:
                  item = contents.pop(0)
                  if item.type == 'dir':
                      contents.extend(repo.get_contents(item.path))
                  elif item.name.endswith('.md'):
                      try:
                          raw = item.decoded_content.decode('utf-8', errors='ignore')
                          if re.search(r'^version:\s*v3', raw, re.MULTILINE | re.IGNORECASE):
                              battle_tested.append({
                                  'skill': item.name.replace('.md', ''),
                                  'category': item.path.split('/')[1]
                              })
                      except Exception:
                          pass
          except Exception:
              pass

          # Sort contributors
          sorted_contributors = sorted(
              contributor_stats.items(),
              key=lambda x: (x[1]['added'] + x[1]['improved'], x[1]['prs']),
              reverse=True
          )

          # FIX: Count total skills dynamically from the filesystem
          total_skills = len(glob.glob('skills/**/*.md', recursive=True))

          # Count expanded skills (v2+)
          v2_count = 0
          try:
              contents = repo.get_contents('skills')
              while contents:
                  item = contents.pop(0)
                  if item.type == 'dir':
                      contents.extend(repo.get_contents(item.path))
                  elif item.name.endswith('.md'):
                      try:
                          raw = item.decoded_content.decode('utf-8', errors='ignore')
                          if re.search(r'^version:\s*v[23]', raw, re.MULTILINE | re.IGNORECASE):
                              v2_count += 1
                      except Exception:
                          pass
          except Exception:
              pass

          # --- Build markdown ---
          lines = [
              '# 🏆 Skills Tree Leaderboard',
              '',
              '> Auto-updated every Monday at 00:00 UTC by the [leaderboard workflow](../.github/workflows/leaderboard.yml).',
              '> Rankings are derived from merged PR activity, skill version upgrades, and contribution volume.',
              '',
              '---',
              '',
              f'## 📅 Week of {week_str}',
              '',
              '### 🔥 Top Skills This Week',
              '',
              '> Skills with the most PR activity and recent improvements.',
              '',
              '| Rank | Skill | Activity |',
              '|------|-------|----------|',
          ]
          medals = ['🥇 1', '🥈 2', '🥉 3', '4', '5']
          if top_skills:
              for i, (skill, count) in enumerate(top_skills):
                  rank = medals[i] if i < len(medals) else str(i + 1)
                  lines.append(f'| {rank} | `{skill}` | {count} PR file touches |')
          else:
              lines.append('| — | *(no activity this week)* | — |')

          lines += [
              '',
              '---',
              '',
              '### 🚀 Most Improved This Week',
              '',
              '> Skills that jumped from v1 → v2 or v2 → v3 this week.',
              '',
              '| Skill | Upgrade | Contributor |',
              '|-------|---------|-------------|',
          ]
          if upgraded_skills:
              for u in upgraded_skills:
                  lines.append(f'| `{u["skill"]}` | {u["from"]} → {u["to"]} | {u["contributor"]} |')
          else:
              lines.append('| *(no upgrades this week)* | | |')

          lines += [
              '',
              '---',
              '',
              '### ⚔️ Battle-Tested Skills',
              '',
              '> Skills that have reached **v3** — fully expanded with all sections.',
              '',
              '| Skill | Category |',
              '|-------|----------|',
          ]
          if battle_tested:
              for bt in battle_tested:
                  lines.append(f'| `{bt["skill"]}` | {bt["category"]} |')
          else:
              lines.append('| *(none yet — first skill to hit v3 earns this badge!)* | |')

          lines += [
              '',
              '---',
              '',
              '### 👥 Top Contributors — All Time',
              '',
              '| Rank | Contributor | Skills Added | Skills Improved | Total PRs |',
              '|------|-------------|-------------|-----------------|----------|',
          ]
          for i, (user, stats) in enumerate(sorted_contributors[:10]):
              rank = medals[i] if i < len(medals) else str(i + 1)
              lines.append(f'| {rank} | @{user} | {stats["added"]} | {stats["improved"]} | {stats["prs"]} |')
          if not sorted_contributors:
              lines.append('| — | *(no contributors yet)* | 0 | 0 | 0 |')

          lines += [
              '',
              '---',
              '',
              f'## 📊 All-Time Stats',
              '',
              '| Metric | Count |',
              '|--------|-------|',
              f'| Total skills | {total_skills} |',  # FIX: dynamic count
              f'| Expanded skills (v2+) | {v2_count} |',
              f'| Battle-Tested skills (v3) | {len(battle_tested)} |',
              f'| Contributors | {len(sorted_contributors)} |',
              '',
              '---',
              '',
              f'*Auto-generated {now.strftime("%Y-%m-%d %H:%M UTC")} · [Contribute a skill](../CONTRIBUTING.md)*',
          ]

          with open('meta/LEADERBOARD.md', 'w') as fh:
              fh.write('\n'.join(lines) + '\n')
          print('Leaderboard written successfully.')
          EOF

      - name: Commit leaderboard update
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add meta/LEADERBOARD.md
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
          else
            git commit -m 'chore(leaderboard): auto-update for week of '$(date +%Y-%m-%d)
            git push
          fi
