name: Weekly Highlights

on:
  schedule:
    - cron: '0 5 * * 1'  # Monday 05:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print output, do not commit)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  weekly-highlights:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate Weekly Highlights
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          python3 - <<'PYEOF'
          import os, re, json, datetime, subprocess, urllib.request, urllib.error

          repo   = os.environ["REPO"]
          token  = os.environ["GH_TOKEN"]
          today  = datetime.date.today()
          week_ago = (today - datetime.timedelta(days=7)).isoformat()

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def gh_get(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read())

          prs_url = (f"https://api.github.com/repos/{repo}/pulls"
                     f"?state=closed&base=main&per_page=50&sort=updated&direction=desc")
          prs = gh_get(prs_url)
          recent_prs = [
              pr for pr in prs
              if pr.get("merged_at") and pr["merged_at"] >= week_ago + "T00:00:00Z"
          ]

          skill_counts = {}
          for pr in recent_prs:
              files_url = f"https://api.github.com/repos/{repo}/pulls/{pr['number']}/files"
              # P-BATCH3 FIX: replaced bare `except: pass` with explicit error
              # logging. File-fetch failures are non-fatal (highlights degrade
              # gracefully) but are now visible in workflow output.
              try:
                  files = gh_get(files_url)
                  for f in files:
                      name = f["filename"]
                      if name.startswith("skills/") and name.endswith(".md"):
                          skill_counts[name] = skill_counts.get(name, 0) + 1
              except urllib.error.HTTPError as exc:
                  print(f"[weekly-highlights] WARNING: could not fetch files for PR #{pr['number']}: HTTP {exc.code} {exc.reason}")
              except urllib.error.URLError as exc:
                  print(f"[weekly-highlights] WARNING: network error fetching PR #{pr['number']} files: {exc.reason}")
              except Exception as exc:
                  print(f"[weekly-highlights] WARNING: unexpected error for PR #{pr['number']}: {exc}")

          top_skills = sorted(skill_counts.items(), key=lambda x: -x[1])[:5]

          upgrades = [
              pr for pr in recent_prs
              if re.search(r'v1.*v2|v2.*v3|v\d.*v\d', pr.get("title", ""), re.IGNORECASE)
          ]

          new_skills = [
              pr for pr in recent_prs
              if re.search(r'^feat.*skill|^add.*skill|new skill', pr.get("title", ""), re.IGNORECASE)
          ]

          week_str = today.strftime("%B %-d, %Y")
          lines = [
              f"<!-- HIGHLIGHTS_START -->",
              f"## \U0001f4c6 This Week's Highlights \u2014 {week_str}",
              "",
          ]

          if top_skills:
              lines.append("### \U0001f525 Most Active Skills")
              for path, count in top_skills:
                  skill_name = os.path.splitext(os.path.basename(path))[0].replace("-", " ").title()
                  lines.append(f"- **{skill_name}** \u2014 {count} PR{'' if count==1 else 's'}")
              lines.append("")

          if upgrades:
              lines.append("### \u2b06\ufe0f Skill Upgrades")
              for pr in upgrades[:5]:
                  lines.append(f"- [{pr['title']}]({pr['html_url']})")
              lines.append("")

          if new_skills:
              lines.append("### \u2728 New Skills")
              for pr in new_skills[:5]:
                  lines.append(f"- [{pr['title']}]({pr['html_url']})")
              lines.append("")

          if not top_skills and not upgrades and not new_skills:
              lines.append("> No skill changes this week. Open a PR to get started!")
              lines.append("")

          lines.append("<!-- HIGHLIGHTS_END -->")
          block = "\n".join(lines)

          dry_run = os.environ.get("DRY_RUN", "false").lower() == "true"
          if dry_run:
              print(block)
          else:
              with open("README.md") as fh:
                  readme = fh.read()

              if "<!-- HIGHLIGHTS_START -->" in readme:
                  new_readme = re.sub(
                      r'<!-- HIGHLIGHTS_START -->.*?<!-- HIGHLIGHTS_END -->',
                      block, readme, flags=re.DOTALL
                  )
              else:
                  new_readme = re.sub(
                      r'(^# .+\n)', r'\1\n' + block + '\n\n', readme, count=1, flags=re.MULTILINE
                  )

              with open("README.md", "w") as fh:
                  fh.write(new_readme)
              print("[weekly-highlights] README.md updated.")
          PYEOF

      - name: Commit updated README
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && echo "No change" && exit 0
          git commit -m "chore(highlights): weekly README highlights update [skip ci]"
          for attempt in 1 2 3; do
            git push origin main && exit 0
            git pull --rebase origin main
            sleep $((attempt * 2))
          done
          echo "ERROR: Push failed after 3 attempts."
          exit 1
