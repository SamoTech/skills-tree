# ============================================================
# stale.yml
# Marks issues/PRs stale after 60 days of inactivity.
# Closes them after 14 more days unless there's activity.
# Never marks enhancement, pinned, or security issues.
# Runs weekly (Sunday 06:00 UTC) — daily was unnecessary
# since stale thresholds are measured in days/weeks.
# ============================================================
name: 🗃️ Stale Issues & PRs

on:
  schedule:
    - cron: '0 6 * * 0'  # Every Sunday at 06:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: 'stale'
          stale-issue-message: |
            👋 This issue has been inactive for 60 days. It will be closed in 14 days
            unless there is new activity. If this is still relevant, please leave a comment
            or remove the `stale` label.
          close-issue-message: |
            🔒 Closing due to inactivity. Feel free to re-open if this is still relevant.
          exempt-issue-labels: 'pinned,security,uptime-alert,enhancement,roadmap'

          # PRs
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-pr-label: 'stale'
          stale-pr-message: |
            👋 This PR has been inactive for 30 days. It will be closed in 14 days
            unless there is new activity.
          close-pr-message: |
            🔒 Closing due to inactivity. Feel free to re-open or re-submit.
          exempt-pr-labels: 'pinned,security,do-not-merge'

          # Never delete the stale label after activity (keep history)
          # FIX: was incorrectly set to true, which removed the stale label on activity
          # — the opposite of what the comment documented. Now correctly false.
          remove-stale-when-updated: false
          operations-per-run: 100
