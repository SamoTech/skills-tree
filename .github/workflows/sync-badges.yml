name: Sync Badge Metadata

# THE BRIDGE — closes the gap between merged PRs and live badge state.
#
# Problem it solves:
#   When an ast-sweep PR merges to `main`, skills declare their dependencies.
#   This workflow reads the SBOM + frontmatter on `main` and updates
#   docs/badges/ in-place — no separate branch needed.
#
# How it works:
#   1. Triggered on any push to `main` touching skills/ or the SBOM.
#   2. Reads SBOM + skill frontmatter from the current `main`.
#   3. Generates badge JSONs and commits them to docs/badges/ on `main`.
#   4. GitHub Pages (served from /docs on main) picks them up automatically.
#
# COLLISION SAFETY: push step uses retry-rebase loop (max 3 attempts).

on:
  push:
    branches: [main]
    paths:
      - 'skills/**/*.md'
      - 'meta/skills-sbom.cdx.json'
  workflow_dispatch:
    inputs:
      force_full_sync:
        description: 'Regenerate ALL badge JSONs (ignore Green/CVE protection — use with care)'
        type: boolean
        default: false


# Serialize runs of THIS workflow on the same ref so concurrent
# scheduled triggers do not race when pushing back to main.
# Distinct workflow classes (graph, exports, badges, …) intentionally
# use different groups so they can still run in parallel.
concurrency:
  group: sync-badges-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    name: Sync badges from main state
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate updated badge JSONs from main state
        run: |
          FORCE_FULL="${{ inputs.force_full_sync || 'false' }}"
          python3 - <<PYEOF
          import json, re, os
          from pathlib import Path

          FORCE_FULL   = os.environ.get("FORCE_FULL", "false") == "true"
          BADGE_DIR    = Path("docs/badges")
          BADGE_DIR.mkdir(parents=True, exist_ok=True)

          SBOM_PATH    = Path("meta/skills-sbom.cdx.json")
          SKILLS_ROOT  = Path("skills")

          sbom_skills: dict[str, list[str]] = {}
          if SBOM_PATH.exists():
              sbom = json.loads(SBOM_PATH.read_text())
              for component in sbom.get("components", []):
                  for skill_path in component.get("usedIn", []):
                      sbom_skills.setdefault(skill_path, []).append(component["name"])

          def parse_frontmatter(text: str) -> dict:
              if not text.startswith("---"):
                  return {}
              end = text.find("---", 3)
              if end == -1:
                  return {}
              block = text[3:end]
              result = {}
              for line in block.splitlines():
                  m = re.match(r'^(\w[\w-]*):\s*(.+)', line.strip())
                  if m:
                      result[m.group(1)] = m.group(2).strip().strip('"\'')
              dep_count = len(re.findall(r'^\s+-\s+package:', block, re.MULTILINE))
              if dep_count:
                  result["_dep_count"] = dep_count
              conf_values = re.findall(r'confidence:\s*(\w[-\w]*)', block)
              result["_all_verified"] = bool(conf_values) and all(c == "verified" for c in conf_values)
              return result

          def skill_key(path: Path) -> str:
              rel = str(path).replace("\\\\", "/")
              return rel.replace("/", "-").replace(".md", "")

          VERIFIED_BADGE = {
              "schemaVersion": 1, "label": "deps",
              "message": "\u2714 verified",
              "color": "22c55e", "style": "flat-square",
          }
          UNSCANNED_BADGE = {
              "schemaVersion": 1, "label": "deps",
              "message": "unscanned",
              "color": "lightgrey", "style": "flat-square",
          }

          updated = skipped = 0
          for skill_path in sorted(SKILLS_ROOT.rglob("*.md")):
              text = skill_path.read_text(encoding="utf-8", errors="ignore")
              fm   = parse_frontmatter(text)
              key  = skill_key(skill_path)
              badge_file = BADGE_DIR / f"{key}.json"

              if not FORCE_FULL and badge_file.exists():
                  existing = json.loads(badge_file.read_text())
                  # Never downgrade CVE/critical badges
                  if "CVE" in existing.get("message", "") or existing.get("color") == "critical":
                      skipped += 1
                      continue
                  # FIX: Never downgrade Green (verified) badges to Yellow/grey
                  if existing.get("color") == "22c55e":
                      skipped += 1
                      continue

              skill_rel = str(skill_path).replace("\\\\", "/")
              in_sbom   = skill_rel in sbom_skills
              dep_pkgs  = sbom_skills.get(skill_rel, [])

              if fm.get("_all_verified") and fm.get("_dep_count", 0) > 0:
                  badge = VERIFIED_BADGE
              elif in_sbom and dep_pkgs:
                  n = len(dep_pkgs)
                  badge = {
                      "schemaVersion": 1, "label": "deps",
                      "message": f"machine-inferred \u00b7 {n} pkg{'s' if n != 1 else ''}",
                      "color": "yellow", "style": "flat-square",
                  }
              elif not badge_file.exists():
                  badge = UNSCANNED_BADGE
              else:
                  continue

              badge_file.write_text(json.dumps(badge, indent=2))
              updated += 1

          print(f"Generated {updated} badge JSON updates in docs/badges/. Skipped {skipped} protected.")
          PYEOF
        env:
          FORCE_FULL: ${{ inputs.force_full_sync || 'false' }}

      - name: Commit changed badges to main (with retry-rebase)
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/badges/
          git diff --staged --quiet && echo "All badges already up to date. No commit needed." && exit 0

          TRIGGER_SHA=$(git rev-parse --short HEAD)
          git commit -m "sync(badges): update docs/badges/ from main@${TRIGGER_SHA}"

          for attempt in 1 2 3; do
            git push origin main && {
              echo "Badges committed to docs/badges/ on main (attempt ${attempt})."
              exit 0
            }
            echo "Push failed (attempt ${attempt}/3). Rebasing..."
            git pull --rebase origin main
            sleep $((attempt * 2))
          done

          echo "ERROR: All 3 push attempts failed."
          exit 1
