name: OSV Dependency Watchdog

# Polls OSV.dev every 15 minutes for CVEs affecting packages in the SBOM.
# SLA: badge states updated within 15 minutes of CVE appearing in OSV database.
# Documented in meta/badge-states.md
#
# ALSO handles badge rehydration:
# On each run, verifies SBOM skills have at least Yellow badges (anti-drift pass).
#
# COLLISION SAFETY: push step uses retry-rebase loop (max 3 attempts).

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print hits, do not update badges)'
        type: boolean
        default: false
      rehydrate:
        description: 'Also rehydrate Yellow badges for SBOM skills (fix stale Grey badges)'
        type: boolean
        default: true

jobs:
  osv-scan:
    name: Query OSV for Active Advisories
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout main branch (for SBOM)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install httpx

      - name: Run OSV check
        id: osv
        working-directory: main-repo
        run: |
          DRY_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          python tools/osv_check.py \
            --sbom meta/skills-sbom.cdx.json \
            --badge-output ../badge-data-output \
            --advisory-file ../osv-hits.json \
            $DRY_FLAG

      - name: Rehydrate Yellow badges for SBOM skills (anti-drift pass)
        if: inputs.dry_run != 'true'
        run: |
          python3 - <<'PYEOF'
          import json
          from pathlib import Path

          SBOM_PATH = Path("main-repo/meta/skills-sbom.cdx.json")
          BADGE_OUT = Path("badge-data-output")
          BADGE_OUT.mkdir(exist_ok=True)

          if not SBOM_PATH.exists():
              print("No SBOM found. Skipping rehydration.")
              exit(0)

          sbom = json.loads(SBOM_PATH.read_text())

          skill_packages: dict[str, list[str]] = {}
          for component in sbom.get("components", []):
              for skill_path in component.get("usedIn", []):
                  skill_packages.setdefault(skill_path, []).append(component["name"])

          rehydrated = 0
          for skill_path, packages in skill_packages.items():
              key  = skill_path.replace("\\", "/").replace("/", "-").replace(".md", "")
              dest = BADGE_OUT / f"{key}.json"
              if dest.exists():
                  existing = json.loads(dest.read_text())
                  if existing.get("color") in ("critical", "22c55e"):
                      continue
                  if "machine-inferred" in existing.get("message", "") or "verified" in existing.get("message", ""):
                      continue
              n = len(packages)
              dest.write_text(json.dumps({
                  "schemaVersion": 1, "label": "deps",
                  "message": f"machine-inferred \u00b7 {n} pkg{'s' if n != 1 else ''}",
                  "color": "yellow", "style": "flat-square",
              }, indent=2))
              rehydrated += 1

          print(f"Rehydrated {rehydrated} Yellow badge(s) for SBOM-tracked skills.")
          PYEOF

      # SECURITY (C-3): badge-data branch is now cloned via actions/checkout
      # using the token parameter. The GITHUB_TOKEN never appears in a git
      # remote URL, preventing leakage through process listings or git errors.
      - name: Checkout badge-data branch
        if: inputs.dry_run != 'true'
        id: checkout_badge_data
        uses: actions/checkout@v4
        with:
          ref: badge-data
          path: badge-data-branch
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Skip if badge-data branch is missing
        if: inputs.dry_run != 'true' && steps.checkout_badge_data.outcome == 'failure'
        run: |
          echo "badge-data branch does not exist yet. Skipping badge push."
          echo "Create it with: git checkout --orphan badge-data && git commit --allow-empty -m 'init'"

      - name: Push updated badges to badge-data branch (with retry-rebase)
        if: inputs.dry_run != 'true' && steps.checkout_badge_data.outcome == 'success'
        run: |
          HAS_JSON=$(find badge-data-output -name '*.json' 2>/dev/null | wc -l | tr -d ' ')
          [ "$HAS_JSON" = "0" ] && echo "No badge JSONs to push." && exit 0

          cp badge-data-output/*.json badge-data-branch/ 2>/dev/null || true

          cd badge-data-branch
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --staged --quiet && echo "No badge changes to commit." && exit 0

          HIT_COUNT=0
          [ -f ../osv-hits.json ] && \
            HIT_COUNT=$(python3 -c "import json; d=json.load(open('../osv-hits.json')); print(len(d.get('hits',[])))" 2>/dev/null || echo 0)

          if [ "$HIT_COUNT" -gt "0" ]; then
            git commit -m "watchdog(osv): advisory badges updated — ${HIT_COUNT} package(s) affected"
          else
            git commit -m "watchdog(rehydrate): Yellow badges rehydrated for SBOM-tracked skills"
          fi

          # --- RETRY-REBASE LOOP ---
          for attempt in 1 2 3; do
            git push origin badge-data && {
              echo "✅ Badge-data push succeeded (attempt ${attempt})."
              exit 0
            }
            echo "Push rejected (attempt ${attempt}/3). Fetching and rebasing..."
            git fetch origin badge-data
            git rebase origin/badge-data || {
              git diff --name-only --diff-filter=U | grep '\.json$' | xargs -I{} git checkout --ours {}
              git add -A
              git rebase --continue
            }
            sleep $((attempt * 2))
          done

          echo "ERROR: All 3 push attempts failed. Next 15-min cron will recover."
          exit 1

      - name: Post advisory summary as GitHub Issue (deduplicated)
        if: steps.osv.outputs.has_hits == 'true' && inputs.dry_run != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('osv-hits.json')) { console.log('No hits file.'); return; }
            const hits = JSON.parse(fs.readFileSync('osv-hits.json', 'utf8'));
            if (!hits.hits || hits.hits.length === 0) return;

            const packageList = hits.hits.map(h => h.package).join(', ');
            const issueTitle = `\ud83d\udea8 Dependency Advisory: ${packageList}`;

            // --- DEDUPLICATION GUARD ---
            // Search for any open issue with the same title. If one exists,
            // skip creation entirely — the existing issue is still actionable.
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'dependency-advisory',
              per_page: 50,
            });

            const duplicate = existingIssues.data.find(issue => issue.title === issueTitle);
            if (duplicate) {
              console.log(`Skipping: open issue #${duplicate.number} already exists with this title.`);
              return;
            }
            // --- END DEDUPLICATION GUARD ---

            let body = `## \ud83d\udea8 Dependency Advisory \u2014 ${new Date().toISOString().slice(0,10)}\n\n`;
            body += `> Detected by 15-minute OSV polling. SLA: badge states are updated within 15 minutes.\n\n`;
            body += `### Affected Packages\n\n`;

            for (const hit of hits.hits) {
              const cves = hit.vulns.map(v => `[${v.id}](https://osv.dev/vulnerability/${v.id})`).join(', ');
              body += `#### \`${hit.package}\` (${hit.purl})\n`;
              body += `**CVEs:** ${cves}\n\n`;
              body += `**Affected skills:**\n`;
              for (const skill of hit.usedIn) { body += `- \`${skill}\`\n`; }
              body += `\n`;
            }

            body += `### Resolution\n\n`;
            body += `1. Update the skill's \`tested_version\` in frontmatter to a patched version\n`;
            body += `2. Open a verification PR (see \`meta/badge-states.md\`)\n`;
            body += `3. On merge, the badge transitions from \`advisory\` back to \`verified\`\n`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body,
              labels: ['security', 'dependency-advisory'],
            });

      - name: No advisories found
        if: steps.osv.outputs.has_hits != 'true'
        run: echo "✅ All packages clean. No advisories in OSV database."
