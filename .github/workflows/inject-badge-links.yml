name: Inject Badge Links

on:
  workflow_run:
    workflows: ["AST Import Extraction + PyPI Validation"]
    types: [completed]
    branches: [main]

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — print changes without writing files"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  inject:
    name: Inject Badge Links into Skill Files
    runs-on: ubuntu-latest

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          # H-6 FIX: use github.repository instead of hardcoded 'SamoTech/skills-tree'
          # so this works correctly in forks and after any repo rename.
          repository: ${{ github.repository }}
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run inject_badge_links.py
        id: inject
        run: |
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi

          python tools/inject_badge_links.py $DRY_FLAG | tee inject-output.txt

          INJECTED=$(grep -c "Injected →" inject-output.txt || true)
          echo "injected_count=${INJECTED}" >> "$GITHUB_OUTPUT"
          echo "Injected badge links into ${INJECTED} file(s)."

      - name: Commit injected badge links
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add skills/
          git diff --staged --quiet && echo "No skill files changed. Nothing to commit." && exit 0

          COUNT=${{ steps.inject.outputs.injected_count }}
          SWEEP_SHA=$(git rev-parse --short HEAD)
          git commit -m "feat(badges): inject dependency status badge links into ${COUNT} skill file(s) [sweep@${SWEEP_SHA}]

          - Added ![Dependency Status] badge image links to ${COUNT} skill file(s)
          - Badge data served from: https://samotech.github.io/skills-tree/badges/
          - Auto-generated by inject-badge-links.yml"

          for attempt in 1 2 3; do
            git push origin main && {
              echo "✅ Badge links committed and pushed (attempt ${attempt})."
              exit 0
            }
            echo "Push rejected (attempt ${attempt}/3). Pulling and retrying..."
            git pull --rebase origin main
            sleep $((attempt * 2))
          done

          echo "ERROR: Push failed after 3 attempts."
          exit 1

      - name: Summary
        if: always()
        run: |
          echo "## 💉 Badge Injection Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f inject-output.txt ]; then
            COUNT=$(grep -c "Injected →" inject-output.txt || echo 0)
            echo "- **Files updated:** ${COUNT}" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Dry run:** ${{ github.event.inputs.dry_run || 'false' }}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>Files modified</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep "Injected →" inject-output.txt || echo "(none)"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_(No output file found)_" >> "$GITHUB_STEP_SUMMARY"
          fi
