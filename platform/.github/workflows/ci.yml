name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: agentforge_test
          POSTGRES_USER: agentforge
          POSTGRES_PASSWORD: secret
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        working-directory: platform
        run: pip install -e '.[dev]'

      - name: Lint
        working-directory: platform
        run: ruff check agentforge/

      - name: Type check
        working-directory: platform
        run: mypy agentforge/ --ignore-missing-imports

      - name: Test
        working-directory: platform
        env:
          DATABASE_URL: postgresql+asyncpg://agentforge:secret@localhost:5432/agentforge_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret
          JWT_SECRET: test-jwt
          OPENAI_API_KEY: sk-test
        run: pytest agentforge/tests/ -v --cov=agentforge --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: platform/coverage.xml
